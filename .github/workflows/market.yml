name: Compute market levels

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market
  cancel-in-progress: false

jobs:
  levels:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Compute levels
        run: python market.py
      - name: Commit if changed
        run: |
          git config user.name "fj-collector"
          git config user.email "actions@users.noreply.github.com"
          git add levels.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "levels: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git pull --rebase
            git push
          fi
