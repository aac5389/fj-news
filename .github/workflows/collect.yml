name: Collect FJ headlines

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Collect headlines
        run: python collect.py
      - name: Commit if changed
        run: |
          git config user.name "fj-collector"
          git config user.email "actions@users.noreply.github.com"
          git add archive.jsonl latest.json
          if git diff --cached --quiet; then
            echo "no new headlines"
          else
            git commit -m "collect: $(date -u +'%Y-%m-%d %H:%M') UTC"
            git push
          fi
